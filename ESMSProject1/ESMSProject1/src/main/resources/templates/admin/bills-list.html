<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Bills - ESMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <h2 class="mb-3">All Bills</h2>
    <a href="/admin/billing/create" class="btn btn-primary mb-3"> Create New Bills</a>

    <!-- agar koi bill nahi hai -->
    <div th:if="${bills.isEmpty()}" class="alert alert-info">
        Koi bill nahi hai abhi. Pahle bill banao!
    </div>

    <!-- Bills Table -->
    <table th:if="${!bills.isEmpty()}" class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>Bill ID</th>
                <th>Customer Name</th>
                <th>Total Amount</th>
                <th>Date & Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="bill : ${bills}">
                <td th:text="${bill.id}"></td>
                <td th:text="${bill.customerName}"></td>
                <td th:text="${'₹' + #numbers.formatInteger(bill.totalAmount, 1, 'COMMA')}"></td>
                <td th:text="${bill.createdAt.toString().substring(0,16).replace('T',' ')}"></td>
                <td>
                    <a th:href="@{/admin/billing/view/{id}(id=${bill.id})}"
                       class="btn btn-sm btn-info">View</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
