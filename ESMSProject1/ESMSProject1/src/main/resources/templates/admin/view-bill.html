<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" >
<head>
    <meta charset="UTF-8">
    <title>View Bill - ESMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

   <!-- Bill Header -->
    <div class="card mb-4">
        <div class="card-header table-dark">
            <h4 class="mb-0">Bill Details</h4>
        </div>
        <div class="card-body">
            <p><strong>Bill ID:</strong><span th:text="${bill.id}"></span></p>
            <p><strong>Customer:</strong><span th:text="${bill.customerName}"></span></p>
            <p><strong>Date:</strong>
                <span th:text="${bill.createdAt.toString().substring(0,16).replace('T', ' ')}"></span>
            </p>
            <p><strong>Total: </strong> ₹ <span th:text="${bill.totalAmount}"></span></p>
        </div>
    </div>

    <!--    Bill Items -->
    <h5 class="mb-3">Items Purchased</h5>
    <table class="table table-bordered">
        <thead class="table-dark">
            <tr>
                <td>Product</td>
                <td>Price per item</td>
                <td>Quantity</td>
                <td>Subtotal</td>
            </tr>
        </thead>
        <tbody>
            <tr th:each="item : ${bill.items}">
                <td th:text="${item.product.name}"></td>
                <td th:text="${'₹' + item.product.price}"></td>
                <td th:text="${item.quantity}"></td>
                <td th:text="${'₹' + item.price}"></td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="table-success">
                <td colspan="3"><strong>Total Amount</strong></td>
                <td><strong th:text="${'₹' + bill.totalAmount}"></strong></td>
            </tr>
        </tfoot>
    </table>

    <a href="/admin/billing" class="btn btn-secondary">Back to Bills</a>
</div>

</body>
</html>
