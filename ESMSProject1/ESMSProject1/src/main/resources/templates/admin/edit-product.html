<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Product -ESMS</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h2>Edit Product</h2>

<form th:action="@{/admin/edit/{id}(id=${product.id})}" method="post">

    <label>Name:</label><br>
    <input type="text" name="name" th:value="${product.name}" required><br><br>

    <label>Description:</label><br>
    <input type="text" name="description" th:value="${product.description}" required><br><br>

    <label>Price:</label><br>
    <input type="number" name="price" step="0.01" th:value="${product.price}" required><br><br>

    <label>Image URL:</label><br>
    <input type="text" name="imageUrl" th:value="${product.imageUrl}" required><br><br>

    <label>Stock Quantity:</label><br>
    <input type="number" name="stockQty" th:value="${product.stockQty}" required><br><br>

    <button type="submit">Update Product</button>
    <a href="/admin">Cancel</a>

</form>

</body>
</html>
