<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - ESMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="/css/style.css"/>
    <link rel="stylesheet" href="/css/products.css"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Page Header -->
<section class="products-header">
    <div class="products-header-content">
        <div class="section-tag">Our Collection</div>
        <h1>All Products</h1>
        <p>Explore our wide range of premium electronics</p>
    </div>
</section>

<!--search + filter bar -->
<section class="search-section">
    <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text"
                id="search-bar"
                placeholder="Search Products...."/>
    </div>
    <div class="filter-btns">
        <button class="filter-btn active"
                data-filter="all">All</button>
        <button class="filter-btn"
                data-filter="laptop">Laptop</button>
        <button class="filter-btn"
                data-filter="mobile">Mobile</button>
        <button class="filter-btn"
                data-filter="headphone">Headphone</button>
    </div>
</section>

<!--Products Grid -->
<section class="products-container">

<!--    koi product nahi hai -->
    <div th:if="${productsList == null or #lists.isEmpty(productsList)}"
         class="no-products">
        <p> 😕 No Products Available! </p>
    </div>

<!--    Products List -->
    <div class="products-grid" id="productsGrid">
        <div class="product-card"
             th:each="product : ${productsList}"
             th:attr="data-name=${product.name},
                      data-category=${product.category}">
<!--       products images     -->
            <div class="product-img">
                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                     th:src="${product.imageUrl}"
                     th:alt="${product.name}"
                     onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'"/>

                <div class="product-emoji"
                     th:style="${product.imageUrl != null and !product.imageUrl.isEmpty() ? 'display:none;' : 'display:flex;'}">
                    📦
                </div>
            </div>
<!--            product info -->
            <div class="product-body">
                <div class="product-stock"
                     th:text="${product.stockQty > 0 ? 'In Stock' : 'Out of Stock'}"
                     th:classappend="${product.stockQty > 0 ? 'in-stock' : 'out-stock'}">
                </div>

                <h3 th:text="${product.name}">Product Name</h3>

                <p th:text="${product.description}">Description</p>

                <div class="product-price"
                     th:text="${'₹' + #numbers.formatInteger(product.price, 1, 'COMMA')}">
                </div>

                <div class="product-stock-qty">
                    <span th:text="${'Stock: ' + product.stockQty + ' units'}"></span>
                </div>
            </div>
        </div>
    </div>
</section>

<!-- js file -->
<script th:src="@{/js/products.js}"></script>
</body>
</html>
